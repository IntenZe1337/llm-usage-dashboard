services:
  llm-usage-dashboard:
    build: .
    image: llm-usage-dashboard:security-20260529
    container_name: llm-usage-dashboard
    restart: unless-stopped
    ports:
      - "100.106.95.127:8099:8099"
    env_file:
      - .env
    volumes:
      - /home/rasmus/.codex:/data/codex:ro
      - /home/rasmus/.claude:/data/claude:ro
    environment:
      - CLAUDE_PROJECTS_DIR=/data/claude/projects
    user: "1000:1000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8099/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
